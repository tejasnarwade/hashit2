<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Vectra.rs | Master the Logic of Wealth</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: 'Inter', sans-serif;
      }

      /* Background 3D Scene */
      spline-viewer {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* UI Overlay Container */
      .ui-overlay {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 1.5rem;
        pointer-events: none; /* Allows interacting with Spline unless clicking a button */
      }

      /* Top Navigation Row */
      .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: auto;
      }

      .logo-text {
        color: #fff;
        font-weight: 800;
        letter-spacing: -1px;
        font-size: 1.4rem;
        text-transform: uppercase;
      }

      /* Buttons */
      .btn {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        pointer-events: auto;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      .btn:active {
        transform: scale(0.95);
        background: rgba(255, 255, 255, 0.1);
      }

      .btn-primary {
        background: #fff;
        color: #000;
        border: none;
        box-shadow: 0 4px 15px rgba(255,255,255,0.2);
      }

      /* Bottom Action Area */
      .bottom-actions {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
        text-align: center;
        padding-bottom: 2rem;
      }

      .headline {
        color: #fff;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      }

      /* Desktop adjustments */
      @media (min-width: 768px) {
        .headline { font-size: 3rem; }
        .bottom-actions { flex-direction: row; justify-content: center; }
      }
    </style>
  </head>
  <body>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.72/build/spline-viewer.js"></script>
<spline-viewer loading-anim-type="spinner-small-dark" url="https://prod.spline.design/ZpXLCq7A0DSqOjyP/scene.splinecode"></spline-viewer>
    <div class="ui-overlay">
      <header class="top-nav">
        <div class="logo-text">Vectra<span style="color: #00ff88;">.rs</span></div>
        <button class="btn" onclick="alert('Accessing Vault...')">Login</button>
      </header>

      <main class="bottom-actions">
        <h1 class="headline">MASTER THE LOGIC OF WEALTH</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="alert('Simulation Initializing...')">Start Simulation</button>
            <button class="btn" onclick="alert('Loading Knowledge Base...')">The Vault</button>
        </div>
      </main>
    </div>

    <div id="root"></div>
  </body>
</html>
